<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TourNet - Тестовая версия</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }
        .header {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .header h1 { color: #fbbf24; }
        .success {
            background: #10b981;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 20px;
            text-align: center;
        }
        .test-bracket {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏆 TourNet</h1>
        <p>Brawl Stars for Cup</p>
    </div>

    <div class="success">
        ✅ JavaScript работает! Файл загрузился правильно.
    </div>

    <div class="test-bracket">
        <h2>Тестовая сетка</h2>
        <p>Здесь будет турнирная таблица</p>
        <button onclick="alert('Кнопка работает!')" style="margin-top: 20px; padding: 10px 20px; cursor: pointer;">
            Нажми меня
        </button>
    </div>

    <script>
        console.log('✅ Страница загрузилась!');
        
        window.onload = function() {
            console.log('✅ Window loaded!');
            document.body.style.background = '#0f172a';
        };
    </script>
</body>
</html>
